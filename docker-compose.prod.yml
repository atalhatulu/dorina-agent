services:
  # ── Production override for dorina-agent ──────────────────────
  dorina-agent:
    restart: always
    ports:
      - "127.0.0.1:8080:8080"  # Local-only in production
    environment:
      - DORINA_ENV=production
      - DORINA_LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./config.prod.yaml:/app/config.yaml:ro
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          memory: 1G

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dorina-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dorina
      POSTGRES_USER: dorina
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dorina"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - dorina-net

  # ── Redis (Cache + Session) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dorina-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - dorina-net

  # ── ChromaDB (Vector Store) ──────────────────────────────────
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: dorina-chromadb
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=["*"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - dorina-net

  # ── Nginx (Reverse Proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dorina-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./www:/var/www/html:ro
    depends_on:
      dorina-agent:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - dorina-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  chromadb-data:
    driver: local

networks:
  dorina-net:
    driver: bridge
